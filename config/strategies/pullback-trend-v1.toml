[strategy]
id = "pullback-trend-v1"
version = "1.0.0"
source = "Al Brooks - Trading Price Action Trends, Parte III (Pullbacks)"

[strategy.parameters]
# Timeframes
operational_timeframe = "15m"
context_timeframe = "1h"
macro_timeframe = "1d"

# Contexto de tendência
min_candles_above_ema20 = 10
ema_context_period = 20
sma_context_period = 200

# Setup
max_pullback_candles = 5
min_signal_body_ratio = 1.5
signal_close_position = "upper_third"

# Entrada, stop e alvo
entry_offset_ticks = 1
stop_offset_ticks = 1
reward_multiple = 2.0

# Filtros
max_spread_pct = 0.05
max_atr_pct = 1.5
min_risk_reward = 2.0

# Precisão do ativo
tick_size = 0.01

# Horário (UTC)
trading_start_time = "14:30:00"
trading_end_time = "21:00:00"
